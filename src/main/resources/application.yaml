server:
  port: 8080
  servlet:
    context-path: /rollBack
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rollBack
    username: root
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"

  level:
    org.springframework.transaction: TRACE
    org.hibernate.SQL: OFF